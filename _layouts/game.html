<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.game_name }} | Frank Valdez Games</title>
  <meta name="description" content="Play {{ page.game_name }}, a browser game by Frank Valdez.">
  <meta name="robots" content="{% if page.game_published %}index, follow{% else %}noindex, follow{% endif %}">
  <link rel="canonical" href="https://frankiejvaldez.com/games/{{ page.game_slug }}/">
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #05070d;
      color: #f8fafc;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      min-height: 100dvh;
      background:
        radial-gradient(circle at top, rgba(37, 99, 235, 0.22), transparent 42rem),
        #05070d;
    }

    .game-frame {
      display: block;
      width: 100%;
      height: 100dvh;
      border: 0;
      background: #05070d;
    }

    .route-status {
      display: grid;
      min-height: 100dvh;
      place-items: center;
      padding: 2rem;
      text-align: center;
    }

    .route-status__card {
      width: min(38rem, 100%);
      padding: clamp(1.5rem, 5vw, 3rem);
      border: 1px solid rgba(148, 163, 184, 0.3);
      border-radius: 1.25rem;
      background: rgba(15, 23, 42, 0.82);
      box-shadow: 0 1.5rem 5rem rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 0.75rem;
      font-size: clamp(2rem, 8vw, 4rem);
    }

    p {
      margin: 0.5rem 0;
      color: #cbd5e1;
      line-height: 1.6;
    }

    a {
      color: #93c5fd;
    }
  </style>

  {% include analytics.html %}
</head>
<body>
  {% if page.game_published %}
    <iframe
      class="game-frame"
      src="{{ page.game_url }}"
      title="Play {{ page.game_name }}"
      allow="autoplay; fullscreen; gamepad"
      allowfullscreen
      referrerpolicy="strict-origin-when-cross-origin"
    ></iframe>
    <noscript>
      <p>
        JavaScript is not required for this wrapper.
        <a href="{{ page.game_url }}">Open {{ page.game_name }} directly</a>.
      </p>
    </noscript>
  {% else %}
    <main class="route-status">
      <section class="route-status__card" aria-labelledby="game-title">
        <p>Game route reserved</p>
        <h1 id="game-title">{{ page.game_name }}</h1>
        <p>
          This address is ready. The game will appear here after its GitHub
          Pages site is published.
        </p>
        <p><a href="/">Return to frankiejvaldez.com</a></p>
      </section>
    </main>
  {% endif %}
</body>
</html>
