<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <meta name="description" content="{{ page.description }}">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="{{ page.canonical }}">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Frank Valdez Portfolio">
  <meta property="og:title" content="{{ page.title }}">
  <meta property="og:description" content="{{ page.description }}">
  <meta property="og:url" content="{{ page.canonical }}">
  <meta property="og:image" content="https://frankiejvaldez.com/myheadshot.jpeg">
  <meta property="og:image:alt" content="Frank Valdez">
  <meta name="twitter:card" content="{{ page.twitter_card | default: 'summary' }}">
  <meta name="twitter:title" content="{{ page.title }}">
  <meta name="twitter:description" content="{{ page.description }}">
  <meta name="twitter:image" content="https://frankiejvaldez.com/myheadshot.jpeg">
  <meta name="twitter:image:alt" content="Frank Valdez">

  {% if page.person_schema %}{% include person-schema.html %}{% endif %}

  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link crossorigin href="https://fonts.gstatic.com" rel="preconnect">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  {% if page.font_heading %}<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet">{% endif %}
  <link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}">

  {% include analytics.html %}
</head>
<body class="{{ page.body_class }}">
  {% include header.html %}
  {{ content }}
  {% include footer.html %}
</body>
</html>
