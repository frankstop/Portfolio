<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.project_name }} | Frank Valdez Portfolio</title>
  <meta name="description" content="View {{ page.project_name }}, a project by Frank Valdez.">
  <meta name="robots" content="{% if page.project_published %}index, follow{% else %}noindex, follow{% endif %}">
  <link rel="canonical" href="https://frankiejvaldez.com/projects/{{ page.project_slug }}/">
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ffffff;
      color: #0f172a;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      min-height: 100dvh;
    }

    .project-frame {
      display: block;
      width: 100%;
      height: 100dvh;
      border: 0;
      background: #ffffff;
    }

    .route-status {
      display: grid;
      min-height: 100dvh;
      place-items: center;
      padding: 2rem;
      text-align: center;
    }

    .route-status__card {
      width: min(38rem, 100%);
      padding: clamp(1.5rem, 5vw, 3rem);
      border: 1px solid rgba(148, 163, 184, 0.3);
      border-radius: 1.25rem;
      background: rgba(15, 23, 42, 0.05);
      box-shadow: 0 1.5rem 5rem rgba(0, 0, 0, 0.05);
    }

    h1 {
      margin: 0 0 0.75rem;
      font-size: clamp(2rem, 8vw, 4rem);
    }

    p {
      margin: 0.5rem 0;
      color: #334155;
      line-height: 1.6;
    }

    a {
      color: #2563eb;
      text-decoration: underline;
    }
  </style>

  {% include analytics.html %}
</head>
<body>
  {% if page.project_published %}
    <iframe
      class="project-frame"
      src="{{ page.project_url }}"
      title="View {{ page.project_name }}"
      allow="autoplay; fullscreen"
      allowfullscreen
      referrerpolicy="strict-origin-when-cross-origin"
    ></iframe>
    <noscript>
      <p>
        JavaScript is not required for this wrapper.
        <a href="{{ page.project_url }}">Open {{ page.project_name }} directly</a>.
      </p>
    </noscript>
  {% else %}
    <main class="route-status">
      <section class="route-status__card" aria-labelledby="project-title">
        <p>Project route reserved</p>
        <h1 id="project-title">{{ page.project_name }}</h1>
        <p>
          This address is ready. The project will appear here after its GitHub
          Pages site is published.
        </p>
        <p><a href="/">Return to frankiejvaldez.com</a></p>
      </section>
    </main>
  {% endif %}
</body>
</html>
